ManageBac Web/Core:
  jira-cycle-time:
    startStatus: Ready For Development
    endStatus: Closed
    estimationField: Story Points
    filter: project = MB
  jira-bugs:
    severityFieldName: "Severity"
    customerBugsFilter: >-
      issuetype = Bug
      AND project = MB
      AND resolution IN (Done, Unresolved)
      AND status != "On Hold"
      AND labels = jira_escalated
      AND ("Root Cause[Dropdown]" NOT IN ("User error", "Configuration error") OR "Root Cause[Dropdown]" IS EMPTY)
  github-prs:
    repos:
      - eduvo/mb_rails4
  newrelic-sla:
    apps:
      - ManageBac Canada
      - ManageBac China
      - ManageBac Usa
      - ManageBac Us2
      - Portal Canada (UAT)
      - Portal China (PROD)
      - Portal USA (Production)

